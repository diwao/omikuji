name: Publish

on:
  push:
    tags:
      - 'v[0-9]+\.[0-9]+\.[0-9]+'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Verify release tag matches package version
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          node -e "const { version } = require('./package.json'); const tag = process.env.RELEASE_TAG || ''; const expected = 'v' + version; if (tag !== expected) { console.error(`Release tag ${tag} does not match package version ${expected}.`); process.exit(1); }"

      - name: Install dependencies
        run: npm ci

      - name: Publish to npm
        run: npm publish
