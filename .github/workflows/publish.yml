name: Publish

on:
  release:
    types:
      - published

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    if: ${{ !github.event.release.prerelease }}
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Verify release tag matches package version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          node -e "const { version } = require('./package.json'); const tag = process.env.RELEASE_TAG || ''; const expected = 'v' + version; if (tag !== expected) { console.error(`Release tag ${tag} does not match package version ${expected}.`); process.exit(1); }"

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Run tests
        run: npm run test:run

      - name: Publish to npm
        run: npm publish
